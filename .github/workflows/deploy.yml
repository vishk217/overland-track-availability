name: Deploy Overland Track App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-2
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    
    - name: Deploy ECR Repository
      run: |
        cd terraform
        terraform init
        terraform apply -target=module.ecr -auto-approve
    
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
    
    - name: Build and Push Docker Image
      run: |
        cd backend
        IMAGE_TAG=${{ github.sha }}
        docker build -t overland-track-lambda .
        docker tag overland-track-lambda:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com/overland-track-lambda:$IMAGE_TAG
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com/overland-track-lambda:$IMAGE_TAG
    
    - name: Deploy Remaining Infrastructure
      run: |
        cd terraform
        terraform apply -var="image_tag=${{ github.sha }}" -auto-approve
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Build Angular App
      run: |
        cd frontend
        npm ci
        npm run build
    
    - name: Upload Frontend to S3
      run: |
        aws s3 sync frontend/dist/browser/ s3://overland-track-frontend --delete